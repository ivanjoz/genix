# Map block to handle 0-RTT security (prevents replay attacks on POST/PUT)
map $ssl_early_data $is_early_data {
    "~on" 1;
    default 0;
}

server {
    # Standard TCP and HTTP/3 UDP listeners for TLS-enabled deployments.
    listen 443 quic reuseport;
    listen 443 ssl;
    listen [::]:443 quic reuseport;
    listen [::]:443 ssl;

    server_name genix-dev-api-2.un.pe;

    ssl_certificate /etc/letsencrypt/live/genix-dev-api-2.un.pe/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/genix-dev-api-2.un.pe/privkey.pem;

    ssl_protocols TLSv1.3;
    ssl_early_data on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets on;

    add_header Alt-Svc 'h3=":443"; ma=86400';

    location / {
        # Handle browser preflight requests directly at the edge to reduce backend load.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $http_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            return 204;
        }

        if ($request_method != GET) {
            set $early_data_check "${is_early_data}";
        }
        #if ($early_data_check = "1") {
        #    return 425;
        #}

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Early-Data $ssl_early_data;

        proxy_pass http://127.0.0.1:3589;

        proxy_pass_header Server;
        server_tokens off;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 4 16k;
    }
}
