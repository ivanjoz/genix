<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>
			window._IS_STORE_APP = true;
			console.log('[Store App] Path:', window.location.pathname, 'Search:', window.location.search);
			// GitHub Pages SPA routing hack: restore path from 'p' parameter
			(function() {
				var l = window.location;
				if (l.search) {
					var q = {};
					l.search.slice(1).split('&').forEach(function(v) {
						var a = v.split('=');
						q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
					});
					console.log('[Store App] Parsed query:', q);
					if (q.p !== undefined) {
						var basePath = l.pathname;
						if (basePath.endsWith('/')) basePath = basePath.slice(0, -1);
						var targetPath = basePath + (q.p || '') + (l.hash || '');
						console.log('[Store App] Restoring path to:', targetPath);
						window.history.replaceState(null, null, targetPath);
					}
				}
			})();
		</script>
		<script>
			// Sticky-header on scroll for the production storefront, where the window itself scrolls.
			// (The builder/editor case — a scrollable container toggling `s2` — lives in Header.svelte's
			// onMount.) This used to live in lib/blurhash.js, which is not part of the build, so it is
			// embedded inline here to guarantee it runs on every served page.
			//
			// The header (#sh-0) may not exist yet when this runs: prerendered pages ship it in the
			// static HTML, but in dev (CSR) it only appears after hydration. So we attach the window
			// scroll listener unconditionally and resolve the element lazily inside the handler.
			(function () {
				var threshold = null;
				var onScroll = function () {
					var node = document.getElementById('sh-0');
					if (!node) return;
					// offsetTop is independent of scroll position, so caching it on first sight is safe.
					if (threshold === null) threshold = node.offsetTop;
					node.classList.toggle('s1', window.scrollY > threshold);
				};
				window.addEventListener('scroll', onScroll, { passive: true });
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
